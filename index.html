<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargar datos</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <h1>SISTEMA DE CONTROL DE STOCK</h1>
    </header>
    <main>
        <!-- PANEL SUPERIOR PARA CARGAR ITEMS -->
        <div class="panel">
            <!-- PANEL DE CARGA -->
            <div class="add-item">
                <h3>PANEL DE CARGA</h3>
                <form action="" method="post">
                    <div class="codigo articulo">
                        <label for="code">Código del Artículo:</label>
                        <input type="text" name="codigo" id="code" placeholder="Ingrese el codigo">
                    </div>
                    <div class="descripcion articulo">
                        <label for="description">Descripción:</label>
                        <input type="text" name="descripcion" id="description" placeholder="Ingrese la descripción">
                    </div>
                    <div class="cantidad-inicial articulo">
                        <label for="cantidad-inicial">Cantidad inicial:</label>
                        <input type="number" name="cantidad" id="cantidad-inicial" placeholder="Ingrese la cantidad">
                    </div>
                    <div class="botones">
                        <input type="button" name="ingresar" id="add" value="AÑADIR">
                    </div>
                </form>
            </div>
            <!-- PANEL DE EDICIÓN -->
            <div class="edit-item">
                <h3>PANEL DE EDICIÓN</h3>
                <form action="" method="post">
                    <!-- ITEMS A SELECCIONAR -->
                    <div class="item articulo">
                        <label for="selector">Producto:</label>
                        <select name="selector" id="selector" class="selector">
                            <option value="">Elija una opción...</option>
                        </select>
                    </div>
                    <!-- CANTIDAD -->
                    <div class="cantidad articulo">
                        <label for="amount">Cantidad a mover:</label>
                        <input type="number" name="cantidad" id="amount" placeholder="Ingrese la cantidad">
                    </div>
                    <!-- BOTONES DE AGREGAR O REMOVER -->
                    <div class="botones">
                        <input type="button" name="ingresar2" id="add-amount" value="ENTRADA">
                        <input type="button" name="remover" id="remove-amount" value="SALIDA">
                    </div>
                </form>
            </div>
        </div>
        <!-- PANEL INFERIOR DONDE APARECEN LAS CANTIDADES Y LOS CODIGOS DE LOS ITEMS -->
        <div class="deposito">
            <h3>ESTADO DEL DEPÓSITO</h3>
            <div class="buscador">
                <label for="search-bar">Buscador:</label>
                <input type="search" name="buscador" id="search-bar" placeholder="Buscar productos...">
            </div>
            <div class="tabla">
                <table>
                    <thead>
                        <tr>
                            <th>CÓDIGO</th>
                            <th>DESCRIPCIÓN</th>
                            <th>STOCK</th>
                            <th><img src="assets/delete.png" alt=""></th>
                        </tr>
                    </thead>
                    <tbody id="inventario-body">
                        
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    <footer>
    
    </footer>
    <script src="js/script.js"></script>
</body>
</html>
